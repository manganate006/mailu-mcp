name: Publish to npm

# Publie sur npm via Trusted Publishing (OIDC) — aucun token stocke, auth par OIDC.
# Autonome : tout push sur main dont la version n'est pas encore publiee declenche
# la publication (garde-fou anti-doublon). Marche aussi via Release ou lancement manuel.
# Prerequis (une fois) : Trusted Publisher configure sur npmjs.com
#   package @manganate06/mailu-mcp -> Settings -> Trusted Publisher -> GitHub Actions
#   Repository: manganate006/mailu-mcp  |  Workflow: publish.yml

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # requis pour l'OIDC (Trusted Publishing)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org   # requis pour cadrer l'echange OIDC
      - name: Ensure npm supports OIDC trusted publishing (>= 11.5.1)
        # npm@latest est passe en v12 (exige Node >= 24.15) ; on epingle npm@11,
        # compatible Node 24 et suffisant pour l'OIDC.
        run: |
          npm install -g npm@11
          node --version
          npm --version
      - run: npm install
      - name: Check if this version is already published
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          # npm view pkg@version sort en exit 0 (vide) si la version n'existe pas :
          # comparer la SORTIE, pas le code retour.
          PUBLISHED=$(npm view "@manganate06/mailu-mcp@$VERSION" version 2>/dev/null || true)
          if [ "$PUBLISHED" = "$VERSION" ]; then
            echo "Deja publie: $VERSION — rien a faire."
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "Nouvelle version: $VERSION — publication."
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish (auth via OIDC, provenance automatique)
        if: steps.check.outputs.publish == 'true'
        run: npm publish --access public
