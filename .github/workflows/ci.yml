name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Type-check & build
        run: npm run build
      - name: Unit tests (mocked, no live server)
        run: npm test
      - name: Bundle
        run: npm run bundle
      - name: Verify bundle exists
        run: test -f dist/bundle.js
